<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#fdf6e8;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
.wrap{max-width:420px;margin:0 auto;padding-bottom:60px}
.hero{text-align:center;padding:52px 20px 20px;background:linear-gradient(180deg,#b8e4f8 0%,#fdf6e8 100%)}
.hero-tag{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:#d44020;margin-bottom:10px;font-weight:700}
.hero-h{font-size:clamp(40px,12vw,68px);font-weight:900;line-height:.9;color:#1a1a2e;letter-spacing:-2px}
.hero-h em{font-style:italic;color:#e04030;display:block;font-weight:300;letter-spacing:0}
.hero-s{font-size:12px;color:#7a6040;margin-top:14px;line-height:1.6;letter-spacing:.5px}
.hero-dot{width:8px;height:8px;border-radius:50%;background:#f0c030;margin:16px auto 0;box-shadow:0 0 12px rgba(240,192,48,.6)}
.map-outer{padding:0 12px;margin-top:18px}
.map-frame{position:relative;border-radius:24px;overflow:hidden;border:2px solid rgba(255,255,255,.8);box-shadow:0 24px 80px rgba(0,0,0,.25)}
svg.bg{display:block;width:100%}
.pl{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pb{position:absolute;transform:translate(-50%,-50%);pointer-events:all;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;-webkit-user-select:none;user-select:none}
.pc{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.pb:active .pc{transform:scale(.82)}
.pb.done .pc{opacity:.3;filter:grayscale(1) brightness(.8)}
.pb.cur .pc{animation:pglow 2s ease-in-out infinite}
@keyframes pglow{0%,100%{box-shadow:0 0 0 0 rgba(240,180,30,.8),0 4px 16px rgba(0,0,0,.3)}50%{box-shadow:0 0 0 14px rgba(240,180,30,0),0 4px 16px rgba(0,0,0,.3)}}

/* ── VEHICLE wrapper ── */
.vehicle{position:absolute;pointer-events:none;z-index:18;transform:translate(-50%,-50%);opacity:0;transition:opacity .4s}
.vehicle.show{opacity:1}

/* ── AVATAR circle ── */
.ch{position:absolute;width:38px;height:38px;border-radius:50%;border:2.5px solid #f0c030;background:#0a1a30;overflow:hidden;pointer-events:none;z-index:20;
  box-shadow:0 0 0 2px rgba(240,192,48,.35),0 6px 20px rgba(0,0,0,.4);
  transform:translate(-50%,-50%);
  transition:left 1s cubic-bezier(.68,-.55,.27,1.55),top 1s cubic-bezier(.68,-.55,.27,1.55)}
.ch img{width:100%;height:100%;object-fit:cover;object-position:center top;mix-blend-mode:lighten}

/* ── SPEECH BUBBLE ── */
.bubble{position:absolute;pointer-events:none;z-index:30;opacity:0;transition:opacity .5s;transform:translate(-50%,-100%)}
.bubble.show{opacity:1}
.bubble-box{background:#fff;border:2px solid #1a1a1a;border-radius:12px;padding:7px 12px;font-size:12px;font-weight:800;color:#1a1a1a;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.bubble-tail{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid #1a1a1a;margin:0 auto;position:relative}
.bubble-tail::after{content:'';position:absolute;top:-11px;left:-6px;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid #fff}

/* ── SHEET ── */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.ov.on{display:flex}
.sh{background:#fffdf5;border-radius:28px 28px 0 0;width:100%;max-width:440px;max-height:82vh;overflow-y:auto;padding-bottom:max(20px,env(safe-area-inset-bottom));animation:sup .35s cubic-bezier(.4,0,.2,1);border-top:1px solid rgba(0,0,0,.06)}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drag{width:40px;height:4px;background:rgba(0,0,0,.1);border-radius:2px;margin:14px auto 0}
.sh-hd{padding:18px 22px 16px;border-bottom:1px solid rgba(0,0,0,.05);display:flex;align-items:center;gap:16px}
.sh-ic{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.sh-tm{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#c04020;margin-bottom:4px;font-weight:700}
.sh-ti{font-size:22px;font-weight:800;color:#1a1a2e;line-height:1.1}
.sh-su{font-size:12px;color:#7a6040;margin-top:3px}
.sh-bd{padding:18px 22px 22px}
.sh-tx{font-size:14px;line-height:1.9;color:#5a4a30;margin-top:14px}
.sh-tx strong{color:#1a3a1a;font-weight:700}
.vw{width:100%;border-radius:16px;overflow:hidden;background:#f0e8d0;aspect-ratio:16/9;margin-top:14px}
.vw video{width:100%;height:100%;object-fit:cover;display:block}
.tg{display:inline-flex;align-items:center;padding:5px 14px;border-radius:10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:800;margin-top:14px;border:1.5px solid}
.cb{margin-top:18px;width:100%;background:rgba(0,0,0,.04);border:1.5px solid rgba(0,0,0,.08);border-radius:14px;padding:15px;font-size:11px;color:#7a6040;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s;font-weight:700}
.castle-code{margin-top:14px}
.castle-code input{width:100%;padding:14px 18px;border-radius:12px;border:2px solid #e0d0b0;font-size:18px;font-weight:800;letter-spacing:6px;text-align:center;text-transform:uppercase;color:#3a2a10;background:#fffbf0;outline:none}
.castle-code input:focus{border-color:#e8a020;box-shadow:0 0 0 3px rgba(240,160,32,.15)}
.castle-code .code-hint{font-size:11px;color:#a08050;margin-top:8px;text-align:center}
.castle-code .code-ok{display:none;color:#2a7a2a;font-weight:800;font-size:13px;text-align:center;margin-top:10px}
.pin-time{font-size:9px;font-weight:700;color:#3a2a10;background:rgba(255,255,255,.85);border-radius:6px;padding:2px 5px;letter-spacing:.3px;text-align:center;margin-bottom:2px;line-height:1.2;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.pb.done .pin-time{opacity:.4}
.pb.castle-done .pc{opacity:.6;filter:brightness(.9)}

/* ── MARIO PIXEL STYLE ── */
.pc{image-rendering:pixelated}
.pb.mario-pin .pc{border-radius:8px!important}

/* ── CASTLE PIN (big, bottom-right) ── */
.pb.castle-pin{flex-direction:column;align-items:center}
.pb.castle-pin .pc{
  width:76px!important;height:76px!important;
  border-radius:12px!important;
  border:3px solid rgba(255,220,100,.7)!important;
  box-shadow:0 0 0 2px rgba(180,80,220,.5),0 6px 24px rgba(120,30,180,.5)!important;
  animation:castleGlow 2.5s ease-in-out infinite!important;
}
@keyframes castleGlow{
  0%,100%{box-shadow:0 0 0 0 rgba(255,200,50,.9),0 0 24px rgba(180,80,220,.5)}
  50%{box-shadow:0 0 0 18px rgba(255,200,50,0),0 0 36px rgba(220,120,255,.7)}
}
.pb.castle-pin .pin-time{font-size:10px;font-weight:900;background:rgba(120,40,200,.85);color:#ffe060;border-radius:8px;padding:3px 8px;border:1px solid rgba(255,200,80,.4)}

/* ── CODE DISPLAY BAR ── */
#codeBar{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:rgba(20,10,40,.82);
  border:2px solid rgba(255,200,60,.5);
  border-radius:12px;padding:5px 14px;
  font-family:'Courier New',monospace;font-size:14px;font-weight:900;
  letter-spacing:6px;color:#ffe060;
  text-shadow:0 0 8px rgba(255,200,60,.8);
  box-shadow:0 2px 16px rgba(0,0,0,.5);
  min-width:120px;text-align:center;
  pointer-events:none;z-index:25;
  display:none;
  transition:opacity .3s;
}
#codeBar.show{display:block}
</style>

   tx:"<em style='font-size:13px;color:#a08060;letter-spacing:1px'>Hola 👋</em><br><br>Hoy he venido a uno de <em>mis</em> restaurantes… pero no es un sitio cualquiera.<br>Es de esos lugares que no se explican, se viven.<br><br>A las 14:30 tienes una cita.<br>Di que vienes de parte de <strong>Mercam</strong>… y entenderán todo. Te darán el mejor servicio.<br><br>Solo te adelanto una cosa: mientras comes, no estarás sola…<br>algo te rodeará, como si el mar entero se hubiese detenido para mirarte. 🐟<br><br>Pero espera, que lo mejor aún no te lo he dicho.<br><br>Hoy invita la casa. 🍾<br>Disfrútalo. Te lo mereces."
  },
  {
    ic:"🐬",
    t:"15:30 – 18:30",
    n:"Oceanogràfic",
    s:"Animales · Recorrido",
    c:"#0860a0",
    tag:null,
    vid:null,
    tx:"Cada criatura aquí custodia un fragmento de una historia milenaria.Los corales que no mueren, las tortugas que han visto siglos pasar y las medusas que flotan como fantasmas eléctricos.No vienes a mirar el mar; vienes a que el océano te reconozca como parte de su misterio. 🌊"  },
  {
    ic:"🏰",
    t:"20:00",
    n:"El Castillo",
    s:"Descanso · Aventura nocturna",
    c:"#7040a0",
    tag:"Código secreto",
    vid:null,
    tx:"Has llegado al destino final. Hoy ha sido un día mágico ✨<br><br>Para entrar al castillo necesitas el <strong>código secreto</strong> 🔐",
    castle:true
  }
];

let cur=0, locked=false, castleOpened=false;
// Code digits revealed per pin click (pin 0-5 reveal one digit each)
const SECRET_CODE="871831";
let revealedDigits=[];

function updateCodeBar(){
  const bar=document.getElementById("codeBar");
  const disp=document.getElementById("codeDigits");
  if(!bar||!disp) return;
  if(revealedDigits.length===0){bar.classList.remove("show");return;}
  bar.classList.add("show");
  let str="";
  for(let i=0;i<6;i++){
    str+=(revealedDigits[i]!==undefined?revealedDigits[i]:"_");
    if(i<5) str+="  ";
  }
  disp.textContent=str;
}

function revealDigitForPin(i){
  // Each pin 0-5 reveals digit i of the code
  if(i>=0 && i<=5 && revealedDigits[i]===undefined){
    revealedDigits[i]=SECRET_CODE[i];
    updateCodeBar();
  }
}

const pins=[
  {l:12,t:19},{l:87,t:19},{l:41,t:52},{l:69,t:52},{l:50,t:61},{l:50,t:79},{l:50,t:94}
];

function getPos(i){
  const f=document.getElementById("mf");
  return {x:pins[i].l/100*f.offsetWidth, y:pins[i].t/100*f.offsetHeight};
}

function updateBubble(){
  const ch=document.getElementById("ch");
  const b=document.getElementById("bubble");
  const f=document.getElementById("mf");
  const fr=f.getBoundingClientRect();
  const chl=parseFloat(ch.style.left)||0;
  const cht=parseFloat(ch.style.top)||0;
  // position bubble above+right of avatar
  b.style.left=(chl+26)+"px";
  b.style.top=(cht-32)+"px";
}

function showBubble(show){
  const b=document.getElementById("bubble");
  updateBubble();
  b.classList.toggle("show",show);
}

function setMainAvatarPos(x,y,animate){
  const ch=document.getElementById("ch");
  if(!animate){
    ch.style.transition="none";
    setTimeout(()=>{ch.style.transition="left 1s cubic-bezier(.68,-.55,.27,1.55),top 1s cubic-bezier(.68,-.55,.27,1.55)"},50);
  }
  ch.style.left=x+"px";
  ch.style.top=(y-24)+"px";
}

function hideMainAvatar(){document.getElementById("ch").style.opacity="0"}
function showMainAvatar(){document.getElementById("ch").style.opacity="1"}

function updatePins(i){
  for(let j=0;j<7;j++){
    const p=document.getElementById("p"+j);
    if(!p)continue;
    p.classList.remove("cur","done");
    if(j<i)p.classList.add("done");
    else if(j===i)p.classList.add("cur");
  }
  cur=i;
}

function openSheet(i){
  const d=D[i];
  document.getElementById("sIc").textContent=d.ic;
  document.getElementById("sIc").style.background=d.c+"28";
  document.getElementById("sTm").textContent=d.t;
  document.getElementById("sTi").textContent=d.n;
  document.getElementById("sSu").textContent=d.s;
  let b="";
  if(d.vid)b+=`<div class="vw"><video controls playsinline><source src="${d.vid}" type="video/mp4"></video></div>`;
  b+=`<span class="tg" style="background:${d.c}18;border-color:${d.c}60;color:${d.c}">${d.tag}</span>`;
  if(d.tx)b+=`<p class="sh-tx">${d.tx}</p>`;
  if(d.img)b+=`<div style="margin-top:16px;border-radius:16px;overflow:hidden;border:2px solid rgba(0,0,0,.07);box-shadow:0 4px 20px rgba(0,0,0,.12)"><img src="${d.img}" style="width:100%;display:block;object-fit:cover;border-radius:14px;max-height:260px"></div>`;
  if(d.castle){
    b+=`<div class="castle-code"><input type="text" id="codeInput" maxlength="6" placeholder="······" oninput="checkCode(this)" style="font-size:22px;letter-spacing:8px"/><div class="code-hint">🔑 Introduce el código secreto del castillo</div><div class="code-ok" id="codeOk" style="display:none">🏰 ¡Bienvenida al castillo! ✨<br><br><strong style="font-size:15px;color:#2a5a2a">📍 Carrer de Manuel Melià i Fuster, 3<br>Planta baja, puerta 6</strong></div><div class="code-ok" id="codeErr" style="display:none;color:#c02020">❌ Código incorrecto. Inténtalo de nuevo.</div></div>`;
  }
  b+=`<button class="cb" onclick="cls()">Cerrar</button>`;
  document.getElementById("sBd").innerHTML=b;
  document.getElementById("ov").classList.add("on");
}

function checkCode(el){
  const ok=document.getElementById("codeOk");
  const err=document.getElementById("codeErr");
  if(el.value==="871831"){
    ok.style.display="block";
    if(err) err.style.display="none";
    el.style.borderColor="#2a8a2a";
  } else if(el.value.length===6){
    ok.style.display="none";
    if(err) err.style.display="block";
    el.style.borderColor="#e03030";
  } else {
    ok.style.display="none";
    if(err) err.style.display="none";
    el.style.borderColor="#e0d0b0";
  }
}

function cls(){
  document.getElementById("ov").classList.remove("on");
}
function clov(e){if(e.target===document.getElementById("ov"))cls()}

// ── ANIMATION HELPERS ──
function setTrainPos(pct,instant){
  const f=document.getElementById("mf");
  const vT=document.getElementById("vTrain");
  if(instant) vT.style.transition="none";
  else vT.style.transition="left 2.2s cubic-bezier(.4,0,.6,1), top .5s ease";
  vT.style.left=pct+"%";
  vT.style.top="29.5%";
}

function setMotoPos(lPct,tPct,instant,flipX){
  const vM=document.getElementById("vMoto");
  if(instant) vM.style.transition="none";
  else vM.style.transition="left 2s cubic-bezier(.4,0,.6,1), top 1.5s cubic-bezier(.4,0,.6,1)";
  vM.style.left=lPct+"%";
  vM.style.top=tPct+"%";
  vM.style.transform=flipX?"translate(-50%,-50%) scaleX(-1)":"translate(-50%,-50%)";
}

// ── MAIN CLICK HANDLER ──
function op(i){
  if(locked)return;

  // Reveal digit for this pin (pins 0-5 each reveal one digit)
  revealDigitForPin(i);

  // bubble logic
  if(i===3) showBubble(true);
  if(i>=4) showBubble(false);

  // ── 0: INTRO ──
  if(i===0){
    locked=true;
    updatePins(0);
    const pos=getPos(0);
    // train at origen
    setTrainPos(5,true);
    document.getElementById("vTrain").style.opacity="1";
    document.getElementById("vTrain").classList.add("show");
    document.getElementById("avatarOnTrain").style.display="block";
    hideMainAvatar();
    setTimeout(()=>{
      openSheet(0);
      locked=false;
    },400);
    return;
  }

  // ── 1: VIAJE — train travels right ──
  if(i===1){
    locked=true;
    updatePins(1);
    // ensure train at origen with avatar on it
    document.getElementById("vTrain").style.opacity="1";
    document.getElementById("vTrain").classList.add("show");
    document.getElementById("avatarOnTrain").style.display="block";
    hideMainAvatar();
    setTrainPos(5,true);
    setTimeout(()=>{
      // train moves to destino
      document.getElementById("vTrain").style.transition="left 2.4s cubic-bezier(.4,0,.4,1)";
      document.getElementById("vTrain").style.left="68%";
      setTimeout(()=>{
        // avatar gets off
        document.getElementById("avatarOnTrain").style.display="none";
        const pos=getPos(1);
        setMainAvatarPos(pos.x, pos.y, false);
        showMainAvatar();
        // fade out train
        document.getElementById("vTrain").style.transition="opacity .6s";
        document.getElementById("vTrain").style.opacity="0";
        // show moto at destino ready for next
        setMotoPos(87,29.5,true,false);
        document.getElementById("vMoto").style.opacity="1";
        document.getElementById("vMoto").classList.add("show");
        document.getElementById("avatarOnMoto").style.display="none";
        setTimeout(()=>{
          openSheet(1);
          locked=false;
        },700);
      },2600);
    },150);
    return;
  }

  // ── 2: HEMISFERIC — moto rides left ──
  if(i===2){
    locked=true;
    updatePins(2);
    // avatar hops on moto
    document.getElementById("vMoto").style.opacity="1";
    document.getElementById("vMoto").classList.add("show");
    document.getElementById("avatarOnMoto").style.display="block";
    hideMainAvatar();
    setMotoPos(87,29.5,true,false); // at destino facing left
    setTimeout(()=>{
      // flip moto to face left and ride
      setMotoPos(32,57,false,true);
      setTimeout(()=>{
        document.getElementById("avatarOnMoto").style.display="none";
        const pos=getPos(2);
        setMainAvatarPos(pos.x, pos.y, false);
        showMainAvatar();
        document.getElementById("vMoto").style.transition="opacity .5s";
        document.getElementById("vMoto").style.opacity="0";
        setTimeout(()=>{
          openSheet(2);
          locked=false;
        },700);
      },2200);
    },150);
    return;
  }

  // ── 3-6: simple avatar movement ──
  locked=true;
  updatePins(i);
  const pos=getPos(i);
  showMainAvatar();
  const ch=document.getElementById("ch");
  ch.style.transition="left .95s cubic-bezier(.68,-.55,.27,1.55),top .95s cubic-bezier(.68,-.55,.27,1.55)";
  ch.style.left=pos.x+"px";
  ch.style.top=(pos.y-24)+"px";
  // update bubble position if visible
  if(document.getElementById("bubble").classList.contains("show")){
    setTimeout(updateBubble,500);
  }
  setTimeout(()=>{
    openSheet(i);
    locked=false;
  },1100);
}

window.addEventListener("load",()=>{
  const ch=document.getElementById("ch");
  ch.style.transition="none";
  // train at origen on load
  const vT=document.getElementById("vTrain");
  vT.style.left="5%"; vT.style.top="29.5%";
  vT.style.transition="none";
  vT.style.opacity="1"; vT.classList.add("show");
  document.getElementById("avatarOnTrain").style.display="block";
  hideMainAvatar();
  // avatar position reset
  const pos=getPos(0);
  ch.style.left=pos.x+"px";
  ch.style.top=(pos.y-24)+"px";
  updatePins(0);
  setTimeout(()=>{ch.style.transition="left .95s cubic-bezier(.68,-.55,.27,1.55),top .95s cubic-bezier(.68,-.55,.27,1.55)"},100);
});

window.addEventListener("resize",()=>{
  if(cur>=1){
    const pos=getPos(cur);
    const ch=document.getElementById("ch");
    ch.style.left=pos.x+"px";
    ch.style.top=(pos.y-24)+"px";
  }
  updateBubble();
});
</script>
